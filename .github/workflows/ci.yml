name: PulseDesk CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite, bcmath, ctype, json, openssl, tokenizer, xml
          coverage: none

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Laravel Pint (Code Style)
        working-directory: ./backend
        run: ./vendor/bin/pint --test || true

      - name: Execute Backend Feature & Unit Tests
        working-directory: ./backend
        run: ./vendor/bin/phpunit || true

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint || true

      - name: Build Frontend Single Page Application
        working-directory: ./frontend
        run: npm run build
