# Hermes (orchestrator / product owner) -- EastRouter config. Secrets REDACTED on purpose.
agent:
  name: Hermes
  role: Orchestrator & Product Owner
  description: Autonomous AI Product Owner & Scrum Master managing sprint backlogs, task decomposition, and code reviews.

provider: eastrouter
base_url: https://api.eastrouter.com/v1
api_key: ${EASTROUTER_API_KEY}
model: deepseek/deepseek-v4-pro

memory:
  enabled: true
  type: vector_persistent
  context_window: 128000

capabilities:
  spec_decomposition: true
  sprint_planning: true
  task_assignment: true
  code_review: true

slack:
  enabled: true
  app_token: ${SLACK_APP_TOKEN}
  bot_token: ${SLACK_BOT_TOKEN}
  channels:
    - "#sprint-main"
    - "#agent-coder"
    - "#human-review"
    - "#agent-log"
    - "#ci-cd"
